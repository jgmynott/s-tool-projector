# S-Tool — Nightly End-to-End Pipeline
#
# Every night the site self-refreshes: fresh projections, fresh
# fundamentals, fresh NN training, fresh picks, fresh deploy. No manual
# step needed.
#
# Trigger order:
#   22:00 UTC weekdays  — full pipeline (post-close so forward data is clean)
#   Also: workflow_dispatch for on-demand refresh
#
# Required secrets (Settings → Secrets and variables → Actions):
#   FMP_API_KEY
#   FINNHUB_API_KEY
#   POLYGON_API_KEY
#   FRED_API_KEY
#   ALPHA_VANTAGE_API_KEY
#   RAILWAY_TOKEN            (for backend redeploy; generate at railway.com/account/tokens)
#   CLOUDFLARE_API_TOKEN     (scope: Workers Scripts:Edit — create at dash.cloudflare.com/profile/api-tokens)

name: nightly-pipeline

permissions:
  contents: write

on:
  schedule:
    # Post-close + settled (22:00 UTC = 18:00 ET). Gives the market an
    # hour to print final prints before we rebuild the engine state.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0    # full history so rebase on push is clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Extras the new pipeline needs beyond requirements.txt
          pip install scikit-learn yfinance

      # projector_cache.db grows past GitHub's 100MB file limit when the
      # full universe is populated, so we cache it between runs rather
      # than commit it. Same for the price csvs under data_cache/prices/.
      - name: Restore engine cache
        uses: actions/cache@v4
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-${{ github.run_id }}
          restore-keys: |
            engine-cache-

      # ── STEP 1: smoke-test external providers ─────────────────────
      - name: Smoke-test providers
        run: python3 data_providers.py

      # ── STEP 2: refresh projections (full Russell 3000) ───────────
      # worker.py --all iterates the IWV universe; STALE_HOURS inside
      # skips anything computed within the last 18h so daily runtime
      # stays under an hour.
      - name: Refresh projections
        run: |
          python3 worker.py --all || echo "worker.py exited non-zero; continuing"

      # ── STEP 3: enrichment layer (cache-based, idempotent) ────────
      - name: Market-cap + avg-volume enrichment
        run: python3 enrich_marketcaps.py --workers 6 || true

      - name: FMP profile enrichment (fills 250/day, grows over time)
        run: python3 enrich_profiles.py --workers 4 || true

      - name: SEC EDGAR fundamentals
        run: |
          python3 - << 'PY'
          import sqlite3, signals_sec_edgar
          conn = sqlite3.connect("projector_cache.db")
          signals_sec_edgar.init_sec_fundamentals_table(conn)
          syms = [r[0] for r in conn.execute(
              "SELECT DISTINCT symbol FROM projections").fetchall()]
          signals_sec_edgar.refresh_universe(syms)
          PY

      # ── STEP 4: research harness + NN training ────────────────────
      # upside_hunt rebuilds the (ticker×window→realized_return) ground
      # truth. overnight_learn trains both the asymmetric scorer and
      # confidence model against the latest ground truth, writing the
      # winning scorer + today's NN scores into data_cache/.
      - name: Upside research sweep
        run: python3 upside_hunt.py || true

      - name: Nightly NN training
        run: python3 -W ignore overnight_learn.py || true

      - name: Today's asymmetric scoring (EWMA fallback)
        run: python3 enrich_asymmetric.py --workers 6 || true

      - name: Feature ablation study
        run: python3 -W ignore feature_ablation.py || true

      - name: Comprehensive backtest report
        run: python3 overnight_backtest.py || true

      # ── STEP 5: final portfolio scan + preflight ──────────────────
      # worker.py already runs scan_universe at the end; but we run it
      # explicitly so picks.json picks up the freshest NN scores and
      # market cap cache from the enrichment steps above.
      - name: Final portfolio scan
        run: |
          python3 - << 'PY'
          from db import init_db
          from portfolio_scanner import scan_universe, save_picks
          conn = init_db()
          results = scan_universe(conn)
          save_picks(results, conn=conn)
          PY

      - name: Preflight (block on QC failures)
        run: python3 preflight.py || (echo "Preflight FAILED — not deploying"; exit 1)

      # ── STEP 6: commit cache + NN artifacts to main ───────────────
      - name: Commit data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the small JSON artifacts that drive the live site.
          # projector_cache.db is cached via actions/cache — too big for git.
          git add -f portfolio_picks.json
          git add -f \
              data_cache/asymmetric_scores.json \
              data_cache/nn_scores.json \
              data_cache/confidence_nn_scores.json \
              data_cache/moonshot_scores.json \
              data_cache/ensemble_scores.json \
              data_cache/feature_importance.json \
              data_cache/production_scorer.json \
              data_cache/market_caps.json \
              data_cache/backtest_report.json \
              data_cache/sec_edgar/company_info.json \
              data_cache/sec_edgar/cik_map.json 2>/dev/null || true
          # Per-ticker FMP profiles — one file per ticker, adds ~250/day.
          git add -f data_cache/profiles/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "chore(nightly): refresh cache + NN artifacts $(date -u +%Y-%m-%dT%H:%MZ)"
            # Rebase-pull to stay ahead of concurrent commits, then push.
            git pull --rebase || true
            git push
          fi

      # Save engine cache for the next nightly run (120-day retention on
      # GitHub's cache free tier). Key includes run_id so each run writes
      # a new entry; restore-keys above grabs the most recent.
      - name: Save engine cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-${{ github.run_id }}

      # ── STEP 7: deploy the live site ──────────────────────────────
      # Cloudflare = frontend pages; Railway = FastAPI backend serving
      # /api/picks + /api/me. Both are deployed on every nightly run so
      # anyone hitting s-tool.io gets today's picks + NN scores without
      # waiting for a manual deploy.
      - name: Deploy frontend (Cloudflare)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: deploy

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy backend (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach --service api
