name: backfill-trade-journal
# One-shot dispatch: walk Alpaca activity history, merge missing fills into
# runtime_data/trade_journal.json, commit. Use this whenever the track-record
# page is missing trades (close window slipped past EOD, breaker fired before
# the journaling fix, etc.).

on:
  # 20:30 UTC weekdays = 16:30 ET = 30 min after market close. By then:
  #   - trader.yml close window (19:48 UTC) has flushed today's force-closes
  #   - scalper.yml last tick (19:55 UTC) has finished
  #   - Alpaca's activities feed has settled
  # Sweeping at this point captures any bracket-child fills that landed
  # async during the day — orders the trader didn't see come back through
  # its synchronous fill-poll. Keeps trade_journal.json self-healing without
  # manual intervention.
  schedule:
    - cron: "30 20 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to backfill"
        required: true
        default: "14"
        type: string
      reset:
        description: "Strip existing backfilled rows first (rerun cleanly)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

concurrency:
  group: backfill-trade-journal
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run backfill
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL }}
          # Schedule fires with no inputs → fall back to 3 days (catches
          # today's bracket fills + a 2-day buffer for late-settling
          # activities). Manual dispatch passes its inputs through.
          BACKFILL_DAYS:     ${{ github.event.inputs.days || '3' }}
          BACKFILL_RESET:    ${{ github.event.inputs.reset == 'true' && '1' || '0' }}
        run: python3 scripts/backfill_journal.py

      - name: Commit journal
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f runtime_data/trade_journal.json ]; then
            git add -f runtime_data/trade_journal.json
          fi
          if git diff --staged --quiet; then
            echo "no journal changes"
          else
            DAYS="${{ github.event.inputs.days || '3' }}"
            git commit -m "chore(journal): backfill ${DAYS}d Alpaca FILL activities $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi
