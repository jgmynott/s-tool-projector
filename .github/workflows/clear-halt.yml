name: clear-halt
# Resume trading after an emergency-halt or auto-breaker fire. Removes
# runtime_data/HALT.flag and commits. The next trader/scalper fire will
# resume normal operation.
#
# Required input is an acknowledgement string — small friction to ensure
# the operator actually intends to clear vs accidentally tapping the
# button. We hash-check it server-side rather than just any-string so
# fat-fingers don't slip through.

on:
  workflow_dispatch:
    inputs:
      ack:
        description: "Type 'I REVIEWED' to confirm you've checked NN scores + recent fills"
        required: true
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: trader-halt
  cancel-in-progress: false

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: Validate acknowledgement
        run: |
          if [ "${{ github.event.inputs.ack }}" != "I REVIEWED" ]; then
            echo "::error::ack input must be exactly 'I REVIEWED' (got: '${{ github.event.inputs.ack }}'). Refusing to clear."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show current HALT.flag
        run: |
          if [ -f runtime_data/HALT.flag ]; then
            echo "Current halt state:"; cat runtime_data/HALT.flag
          else
            echo "No HALT.flag present — nothing to clear"
            exit 0
          fi

      - name: Remove HALT.flag + commit
        run: |
          if [ -f runtime_data/HALT.flag ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm runtime_data/HALT.flag
            git commit -m "chore(halt): clear-halt by ${{ github.actor }} — trader resumed"
            git pull --rebase || true
            git push
          fi
