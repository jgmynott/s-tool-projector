# S-Tool — Fast path (data refresh + picks deploy)
#
# Runs at 20:00 UTC weekdays — ~30 min after US market close. Refreshes
# projections, enrichment, and rescans the portfolio so the live site gets
# today's picks while the model scores are still yesterday's. Heavy compute
# (NN training, feature ablation, backtest) runs in daily-refresh-slow.yml
# at 23:00 UTC, which then re-scores and re-deploys.
#
# Required secrets: FMP_API_KEY, FINNHUB_API_KEY, POLYGON_API_KEY, FRED_API_KEY,
#   ALPHA_VANTAGE_API_KEY, RAILWAY_TOKEN, CLOUDFLARE_API_TOKEN

name: nightly-pipeline-fast

permissions:
  contents: write
  issues: write

on:
  schedule:
    # Sun-Fri 20:00 UTC. Sunday fires for Monday open (the trader's
    # 13:30 UTC weekday window expects fresh picks). Mon-Fri keep
    # rolling forward for the next-day open. Saturday excluded —
    # no fresh market data, and the slow pipeline doesn't run Sat
    # to follow up.
    - cron: "0 20 * * 0-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 90 min cap instead of 45: the first run against a cold engine cache
    # has to compute projections for ~800-1000 tickers from scratch and
    # regularly overshot the 45-min budget, leaving the cache empty and
    # poisoning every downstream run. Warm-cache runs complete in ~15-20
    # min because STALE_HOURS=18 skips fresh symbols.
    timeout-minutes: 90
    env:
      FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn yfinance

      - name: Restore engine cache
        uses: actions/cache@v4
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-fast-${{ github.run_id }}
          restore-keys: |
            engine-cache-

      - name: Smoke-test providers
        run: python3 data_providers.py

      # Fast path scans the preferred universe only (~600 tickers — SP500 ∪
      # NDX100 ∪ WSB favorites) so the critical-path refresh completes in
      # ≤30 min even on a cold cache. The slow path picks up the long tail
      # of the Russell 3000 at 23:00 UTC where it has 2.5 hours to work.
      - name: Refresh projections
        run: |
          python3 worker.py --preferred || echo "worker.py exited non-zero; continuing"

      - name: Market-cap + avg-volume enrichment
        run: python3 enrich_marketcaps.py --workers 6 || true

      - name: FMP profile enrichment (fills 250/day, grows over time)
        run: python3 enrich_profiles.py --workers 4 || true

      - name: SEC EDGAR fundamentals
        run: |
          python3 - << 'PY'
          import sqlite3, signals_sec_edgar
          conn = sqlite3.connect("projector_cache.db")
          signals_sec_edgar.init_sec_fundamentals_table(conn)
          syms = [r[0] for r in conn.execute(
              "SELECT DISTINCT symbol FROM projections").fetchall()]
          signals_sec_edgar.refresh_universe(syms)
          PY

      # EWMA fallback scoring so picks ship even when no fresh NN yet today.
      # Slow path re-runs this with freshly trained NN before re-deploying.
      - name: Today's asymmetric scoring (EWMA fallback)
        run: python3 enrich_asymmetric.py --workers 6 || true

      - name: Final portfolio scan
        run: |
          python3 - << 'PY'
          from db import init_db
          from portfolio_scanner import scan_universe, save_picks
          conn = init_db()
          results = scan_universe(conn)
          save_picks(results, conn=conn)
          PY

      - name: Preflight (block on QC failures)
        run: python3 preflight.py || (echo "Preflight FAILED — not deploying"; exit 1)

      # Snapshot picks_history into runtime_data/ so /api/track-record on
      # Railway has historical pick rows to score. The DB itself lives in
      # GH Actions cache and never reaches Railway, so without this step
      # the track-record page renders zeros across every tier.
      - name: Export picks_history → runtime_data/picks_history.json
        run: python3 export_picks_history.py

      - name: Commit data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f portfolio_picks.json
          git add -f runtime_data/picks_history.json 2>/dev/null || true
          git add -f \
              data_cache/asymmetric_scores.json \
              data_cache/market_caps.json \
              data_cache/sec_edgar/company_info.json \
              data_cache/sec_edgar/cik_map.json 2>/dev/null || true
          git add -f data_cache/profiles/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "chore(nightly-fast): refresh picks + enrichment $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      - name: Save engine cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-fast-${{ github.run_id }}

      - name: Deploy frontend (Cloudflare)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: deploy

      # Install the Railway CLI from npm rather than via railway.com/install.sh,
      # because the install.sh hits GitHub's unauthenticated releases API to
      # discover the latest version and that call rate-limits on shared CI
      # runners, failing with "Failed to fetch latest version from GitHub".
      # npm registry has no such limit.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach --service api

      # L2 post-deploy verifier — polls live API for ≤180s waiting for
      # the new container to swap, asserts /api/portfolio + /api/picks +
      # /api/track-record return valid shapes. Catches the case where
      # railway up succeeds but the new image fails to boot (502s / stale
      # serving). Fails the workflow → existing issue tripwire fires.
      - name: Post-deploy verify
        run: python3 post_deploy_verify.py

      # Loud-failure tripwire. The data refresh pipeline silently froze for
      # 8 days (2026-04-20 → 2026-04-26) because nothing alerted on the
      # preflight failures. GitHub emails the repo owner on issue creation,
      # so this turns a silent workflow-failure into an inbox alert.
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "nightly-pipeline-fast failed — site refresh blocked" \
            --body "$(cat <<EOF
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Triggered: ${{ github.event_name }}
          SHA: ${{ github.sha }}

          Until this is resolved s-tool.io will keep serving the last successfully-deployed picks.
          See \`preflight.py\` output in the run logs for the failing check.
          EOF
          )" \
            --label "broken-deploy" || true
