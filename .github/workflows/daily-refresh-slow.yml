# S-Tool — Slow path (NN training + backtest + re-deploy)
#
# Runs at 23:00 UTC weekdays, ~3 hours after the fast path has landed today's
# picks. Does the heavy research: upside_hunt sweep, NN training, feature
# ablation, honest backtest. Then re-scores today's asymmetric picks with
# fresh NN, re-scans the portfolio, and redeploys so track-record and picks
# reflect the latest models.
#
# The engine cache restore-keys pattern picks up whatever the fast path left
# behind (prices, SEC cache, projector_cache.db), so we don't re-fetch data.
#
# Required secrets: FMP_API_KEY, FINNHUB_API_KEY, POLYGON_API_KEY, FRED_API_KEY,
#   ALPHA_VANTAGE_API_KEY, RAILWAY_TOKEN, CLOUDFLARE_API_TOKEN

name: nightly-pipeline-slow

permissions:
  contents: write
  issues: write

on:
  schedule:
    # Sun-Thu 23:00 UTC. Slow pipeline trains the NN + re-scores asym
    # tier with the fresh model. Runs the night before each trading day
    # so Mon-Fri opens get freshly-trained picks. No Friday slow run —
    # Sunday catches Monday open.
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn yfinance

      - name: Restore engine cache
        uses: actions/cache@v4
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-slow-${{ github.run_id }}
          restore-keys: |
            engine-cache-fast-
            engine-cache-

      # Russell 3000 long-tail refresh was here but burned ~2 hours
      # per run even with STALE_HOURS=18 caching, which starved the NN
      # training + backtest + deploy steps that actually matter. Fast
      # path at 20:00 UTC already refreshes the preferred universe
      # (SP500 ∪ NDX100 ∪ WSB, ~537 symbols) — the picks the Strategist
      # page actually surfaces. Long-tail staleness on the non-preferred
      # Russell 3000 names is tolerable; we can add a weekly job later
      # if/when it matters.

      # Short interest via yfinance. FINRA's public API is stuck on 2020
      # data (compareFilters silently ignored, pagination returns ancient
      # rows). yfinance exposes shortPercentOfFloat, shortRatio, shares
      # short, and sharesShortPriorMonth per ticker — good enough to test
      # as NN features. Takes ~2-3 min on the preferred universe.
      - name: Short interest refresh (yfinance)
        run: |
          python3 -m signals_short_interest_yf --universe preferred --sleep 0.25 || true

      # Finnhub earnings + analyst recommendations. Free tier = 60 req/min
      # so we use 1.1s sleeps = ~10 min for preferred universe (~537
      # tickers). Accumulates nightly; in a month we'll have a dense
      # time-series per ticker to train on. One-shot snapshots today are
      # already usable as "time to next earnings" + "last surprise %"
      # features for near-term prediction.
      - name: Finnhub earnings + recs refresh
        run: |
          python3 -m signals_earnings_finnhub --universe preferred --sleep 1.1 || true

      - name: Upside research sweep
        run: python3 upside_hunt.py || true

      - name: Nightly NN training
        run: python3 -W ignore overnight_learn.py || true

      # Re-score today's picks with the freshly trained NN.
      - name: Asymmetric scoring with fresh NN
        run: python3 enrich_asymmetric.py --workers 6 || true

      - name: Feature ablation study
        run: python3 -W ignore feature_ablation.py || true

      # Nightly short-interest ablation — joins yfinance SI snapshots
      # to the upside_hunt ground truth and reports whether the three
      # derived features (dtc, chg_pct, pct_float) lift hit_100 vs
      # the 8-feature baseline. Writes dated JSON to runtime_data/ so
      # a week of overnight runs produces a time-series of deltas.
      - name: Short interest ablation
        run: python3 research/nightly_short_interest_ablation.py || true

      - name: Comprehensive backtest report
        run: python3 overnight_backtest.py || true

      - name: Final portfolio scan (fresh NN scores)
        run: |
          python3 - << 'PY'
          from db import init_db
          from portfolio_scanner import scan_universe, save_picks
          conn = init_db()
          results = scan_universe(conn)
          save_picks(results, conn=conn)
          PY

      - name: Preflight (block on QC failures)
        run: python3 preflight.py || (echo "Preflight FAILED — not deploying"; exit 1)

      # Mirror the runtime JSONs to runtime_data/ so they ship to Railway
      # reliably. data_cache/ is excluded from the railway up tarball despite
      # gitignore negation tricks (caught 2026-04-17 via a boot-log probe).
      # runtime_data/ has no gitignore entry and is guaranteed to upload.
      - name: Mirror artifacts to runtime_data
        run: |
          mkdir -p runtime_data
          cp data_cache/backtest_report.json runtime_data/ 2>/dev/null || true
          cp data_cache/feature_importance.json runtime_data/ 2>/dev/null || true
          ls -la runtime_data/

      # Same picks_history export the fast path does. Slow re-runs the
      # final portfolio scan with fresh NN scores, which appends today's
      # picks to picks_history a second time (overwriting the fast-path
      # row via the (pick_date, symbol) primary key) — so we re-export
      # to capture those refreshed entry prices and rationales.
      - name: Export picks_history → runtime_data/picks_history.json
        run: python3 export_picks_history.py

      - name: Commit data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f portfolio_picks.json
          git add -f runtime_data/picks_history.json 2>/dev/null || true
          git add -f \
              data_cache/asymmetric_scores.json \
              data_cache/nn_scores.json \
              data_cache/confidence_nn_scores.json \
              data_cache/moonshot_scores.json \
              data_cache/ensemble_scores.json \
              data_cache/feature_importance.json \
              data_cache/production_scorer.json \
              data_cache/market_caps.json \
              data_cache/backtest_report.json \
              data_cache/sec_edgar/company_info.json \
              data_cache/sec_edgar/cik_map.json 2>/dev/null || true
          git add -f data_cache/profiles/*.json 2>/dev/null || true
          git add runtime_data/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "chore(nightly-slow): refresh NN + backtest $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase || true
            git push
          fi

      - name: Save engine cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            projector_cache.db
            data_cache/prices
            data_cache/sec_edgar
          key: engine-cache-slow-${{ github.run_id }}

      - name: Deploy frontend (Cloudflare)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: deploy

      # Install the Railway CLI from npm rather than via railway.com/install.sh,
      # because the install.sh hits GitHub's unauthenticated releases API to
      # discover the latest version and that call rate-limits on shared CI
      # runners, failing with "Failed to fetch latest version from GitHub".
      # npm registry has no such limit.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach --service api

      # Loud-failure tripwire — see daily-refresh-fast.yml for context.
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "nightly-pipeline-slow failed — NN retrain / redeploy blocked" \
            --body "$(cat <<EOF
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Triggered: ${{ github.event_name }}
          SHA: ${{ github.sha }}

          Until this is resolved the slow path won't refresh the NN scorer or run the honest backtest.
          The fast path can still ship picks if it succeeds at 20:00 UTC.
          EOF
          )" \
            --label "broken-deploy" || true
