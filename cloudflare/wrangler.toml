name = "s-tool-site"
main = "src/worker.js"
compatibility_date = "2025-01-01"
account_id = "18479801bf03932e04409c95b49e358a"

[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before serving static assets so applyCacheControl +
# applySecurityHeaders (HSTS, CSP, real Cache-Control with SWR) fire on
# every static-file response. Verified 2026-04-27 that without this flag,
# CF serves /shared/*.js and HTML directly from the edge with the default
# "max-age=0, must-revalidate" and no security headers — the Worker is
# only invoked for paths that don't match an asset.
run_worker_first = true

# The frontend currently hardcodes publishable keys directly in index.html
# (pk_ keys are client-safe by design, visible in any page source). If we later
# move to Worker-side injection via HTMLRewriter, add real values here or set
# them via the Cloudflare dashboard — DON'T declare them as empty strings here
# because wrangler deploy will then clobber whatever the dashboard had.
# Never put sk_ / rk_ / whsec_ secrets here — those live server-side on Railway.

[[routes]]
pattern = "s-tool.io/*"
zone_name = "s-tool.io"

[[routes]]
pattern = "www.s-tool.io/*"
zone_name = "s-tool.io"

# Cron triggers — primary trader scheduler. CF Workers cron is sub-minute
# reliable; GH Actions cron in trader.yml stays as belt-and-suspenders.
# Each expression maps to a window via windowForCron() in worker.js.
# DST/ST: we fire both 09:30 ET windows so the right one is correct year-
# round; the off-season fire is a clean no-op (market not yet open / late-
# close journal pull only). 5 triggers — exactly the free-tier max.
#
# After deploying these, you must set the worker's secrets once:
#   wrangler secret put GITHUB_PAT      (paste fine-grained PAT, contents:w + actions:w)
#   wrangler secret put GITHUB_REPO     (jgmynott/s-tool-projector)
#   wrangler secret put NTFY_TOPIC      (optional — pushes alerts on dispatch failure)
[triggers]
# Cloudflare Workers free tier allows up to 5 distinct cron triggers per
# Worker. All 5 used:
#  * "25 13,14 * * 1-5"        → trader pre_open (09:25 ET — gap-protect sweep)
#  * "30 13,14 * * 1-5"        → trader open
#  * "0,30 14-19 * * 1-5"      → trader rotate (every 30 min)
#  * "55 19,20 * * 1-5"        → trader close
#  * "*/5 14-19 * * 1-5"       → scalper every 5 min during RTH
# targetForCron() in worker.js maps each expression to a workflow + inputs.
crons = [
  "25 13,14 * * 1-5",         # trader pre_open — 09:25 ET (DST + ST)
  "30 13,14 * * 1-5",         # trader open    — 09:30 ET (DST + ST)
  "0,30 14-19 * * 1-5",       # trader rotate every 30 min 14:00–19:30 UTC
  "55 19,20 * * 1-5",         # trader close   — 15:55 ET (DST + ST)
  "*/5 14-19 * * 1-5",        # scalper every 5 min during RTH
]
