<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" role="img" aria-label="s-tool">
  <!-- Compass mark — inverse variant from brand system (mint on forest) -->
  <g>
    <circle cx="50" cy="50" r="48" fill="none" stroke="#a3d4b3" stroke-width="2"/>
    <circle cx="50" cy="50" r="36" fill="#1f6e3f"/>
    <circle cx="50" cy="50" r="24" fill="#4a8b5e"/>
    <line x1="50" y1="2" x2="50" y2="98" stroke="#a3d4b3" stroke-width="1.5"/>
    <line x1="2" y1="50" x2="98" y2="50" stroke="#a3d4b3" stroke-width="1.5"/>
    <line x1="16" y1="16" x2="84" y2="84" stroke="#a3d4b3" stroke-width="1"/>
    <line x1="84" y1="16" x2="16" y2="84" stroke="#a3d4b3" stroke-width="1"/>
    <text x="50" y="62" text-anchor="middle" font-family="'Fraunces','Crimson Text',Georgia,serif" font-style="italic" font-size="36" font-weight="700" fill="#a3d4b3">S</text>
  </g>
  <!-- Wordmark — italic serif "tool", paired with the mark -->
  <text x="115" y="68" font-family="'Fraunces','Crimson Text',Georgia,serif" font-style="italic" font-weight="500" font-size="42" letter-spacing="-0.5" fill="#a3d4b3">tool</text>
</svg>
